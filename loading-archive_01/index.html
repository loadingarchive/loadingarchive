<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Archive</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<!-- Google AdSense -->
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6965515761301412" crossorigin="anonymous"></script>
<!-- HLS playback for Steam trailers (their CDN no longer serves plain mp4 for newer movies) -->
<script defer src="https://cdn.jsdelivr.net/npm/hls.js@1/dist/hls.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: #0E1015;
  color: #fff;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* NAV */
.nav-wrap {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  max-width: 1020px; margin: 0 auto;
  padding: 16px 20px 0;
}
.nav-card {
  background: #13151B;
  border: 1px solid #1F2127;
  border-radius: 22px;
  padding: 11px 20px;
  transition: padding 0.4s cubic-bezier(0.4, 0, 0.2, 1), box-shadow 0.3s ease;
  overflow: hidden;
}
.nav-card.scrolled { box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3); }
.nav-card.open { padding: 14px 18px; }
.nav-top { display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo svg { width: 22px; height: 22px; flex-shrink: 0; filter: drop-shadow(0 0 8px rgba(124,147,255,0.5)); }
.logo span { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.01em; }
.nav-right { display: flex; align-items: center; gap: 18px; }
.nav-right a { font-size: 10px; color: rgba(255,255,255,0.55); text-decoration: none; font-weight: 500; }
.nav-right a:hover { color: #fff; }
.filter-btn {
  font-size: 10px; color: #fff; border: 1.5px solid rgba(255,255,255,0.22);
  background: transparent; padding: 6px 18px; border-radius: 100px; cursor: pointer;
  font-family: 'Inter', sans-serif; font-weight: 600; transition: background 0.15s;
}
.filter-btn:hover { background: rgba(255,255,255,0.08); }
.filter-btn.active { background: #fff; color: #13151B; border-color: #fff; }
.nav-filter { max-height: 0; overflow: hidden; transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
.nav-card.open .nav-filter { max-height: 400px; }
.nav-filter-inner { padding-top: 18px; }
.filter-label { font-size: 10px; color: rgba(255,255,255,0.4); margin-bottom: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
.chips { display: flex; flex-wrap: wrap; gap: 8px; }
.chip {
  display: flex; align-items: center; gap: 5px;
  font-size: 10px; padding: 4px 10px 4px 6px; border-radius: 10px; cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.15); background: rgba(255,255,255,0.05);
  color: #fff; font-weight: 500; user-select: none; transition: opacity 0.15s;
  font-family: 'Inter', sans-serif;
}
.chip.active { opacity: 0.35; }
.chip .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
.chip .dot.outline { border: 1.5px solid rgba(255,255,255,0.55); background: transparent; }

/* HERO */
.hero {
  background: url('assets/header-bg.jpg') center center / cover no-repeat;
  height: 720px;
  display: flex; flex-direction: column;
  position: relative;
  padding-top: 68px;
}
.tagline {
  text-align: center;
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 0 20px 60px;
  max-width: 660px; margin: 0 auto; width: 100%;
}
.tagline h1 {
  font-size: 25px; font-weight: 600; color: #fff;
  line-height: 1.32; max-width: 470px; margin: 0 auto 22px;
  letter-spacing: -0.015em;
}
.month-pill {
  display: inline-flex; align-items: center; justify-content: center;
  font-size: 10px; font-weight: 400;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 10px; padding: 6px 18px; color: #fff; margin-bottom: 8px;
}
.tagline-arrow { display: flex; justify-content: center; }

/* MAIN LAYOUT */
.main-wrap {
  max-width: 1020px; margin: -30px auto 0;
  padding: 0 20px 140px;
  position: relative;
  display: flex;
  gap: 24px;
}

/* SIDE NAV */
.side-nav {
  position: absolute; left: -70px; top: 80px; bottom: 140px;
  width: 50px;
  flex-shrink: 0;
}
.side-nav-inner {
  position: sticky; top: 96px; height: 330px; width: 50px;
  cursor: grab; user-select: none;
}
.side-nav-inner:active { cursor: grabbing; }
.sn-label {
  position: absolute; right: 36px;
  font-size: 10px; color: rgba(255,255,255,0.9); font-weight: 500;
  white-space: nowrap; font-family: 'Inter', sans-serif;
  display: flex; align-items: center; gap: 6px;
  transform: translateY(-50%); transition: top 0.08s ease;
  pointer-events: none;
}
.sn-label::after { content: ''; display: block; width: 10px; height: 1px; background: rgba(255,255,255,0.7); }

/* CONTENT AREA */
.content-area { flex: 1; min-width: 0; }

/* SEARCH + FILTER BAR */
.list-toolbar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; margin-top: 60px;
}
.list-search {
  flex: 1; background: #13151B; border: 1px solid #1F2127;
  border-radius: 10px; padding: 9px 14px;
  color: #fff; font-size: 10px; outline: none;
  font-family: 'Inter', sans-serif;
  transition: border-color 0.15s;
}
.list-search::placeholder { color: rgba(255,255,255,0.28); }
.list-search:focus { border-color: rgba(255,255,255,0.2); }

.platform-bar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.pbar-label { font-size: 10px; color: rgba(255,255,255,0.35); font-weight: 500; margin-right: 4px; }
.pbar-chip {
  font-size: 10px; font-weight: 600; padding: 4px 12px;
  border-radius: 20px; cursor: pointer; border: 1.5px solid transparent;
  font-family: 'Inter', sans-serif; color: rgba(255,255,255,0.35);
  background: rgba(255,255,255,0.05);
  transition: color 0.15s, background 0.15s, border-color 0.15s; user-select: none;
  display: flex; align-items: center; gap: 5px;
}
.pbar-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: transparent; border: 1.5px solid rgba(255,255,255,0.3); transition: background 0.15s, border-color 0.15s; }
.pbar-chip.active { color: #fff; }
.pbar-chip.active .dot { border-color: transparent; }
.pbar-chip.active.PC   { background: rgba(90,93,100,0.3); border-color: #5A5D64; }
.pbar-chip.active.PC   .dot { background: #A0A3AA; }
.pbar-chip.active.NS   { background: rgba(224,52,43,0.2); border-color: #E0342B; }
.pbar-chip.active.NS   .dot { background: #E0342B; }
.pbar-chip.active.NS2  { background: rgba(192,40,43,0.2); border-color: #C0282B; }
.pbar-chip.active.NS2  .dot { background: #E03030; }
.pbar-chip.active.PS4  { background: rgba(46,109,180,0.2); border-color: #2E6DB4; }
.pbar-chip.active.PS4  .dot { background: #2E6DB4; }
.pbar-chip.active.PS5  { background: rgba(59,130,196,0.2); border-color: #3B82C4; }
.pbar-chip.active.PS5  .dot { background: #3B82C4; }
.pbar-chip.active.XBO  { background: rgba(44,162,67,0.2); border-color: #2CA243; }
.pbar-chip.active.XBO  .dot { background: #2CA243; }
.pbar-chip.active.XSX  { background: rgba(44,162,67,0.2); border-color: #2CA243; }
.pbar-chip.active.XSX  .dot { background: #2CA243; }
.pbar-chip.cat { color: rgba(255,255,255,0.35); border-color: rgba(255,255,255,0.12); }
.pbar-chip.cat.active { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

/* GAME GRID */
.game-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 12px;
}
@media (max-width: 900px) {
  .game-grid { grid-template-columns: repeat(2, 1fr); }
}
@media (max-width: 600px) {
  .game-grid { grid-template-columns: 1fr; }
}

/* CARD DATE — sits above the cover, inside the card */
.card-date {
  font-size: 10px; color: rgba(255,255,255,0.35);
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
}
.card-date-text span { color: rgba(255,255,255,0.65); }

/* GAME CARD */
.game-card {
  background: #13151B; border-radius: 10px;
  border: 1px solid #1F2127; overflow: hidden;
  transition: border-color 0.15s;
  display: flex; flex-direction: column;
  padding: 15px; gap: 10px;
}
.game-card:hover { border-color: #2c2f3a; }

.card-cover {
  width: 100%; aspect-ratio: 460/215;
  overflow: hidden; flex-shrink: 0; border-radius: 5px;
  background: linear-gradient(135deg, #1a1d27 0%, #232630 100%);
}
.card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }
.card-cover-placeholder {
  width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
}
.card-cover-placeholder svg { width: 20px; height: 20px; opacity: 0.15; }

.card-body { flex: 1; display: flex; flex-direction: column; gap: 9px; }

.card-title {
  font-size: 13px; font-weight: 700; color: #fff;
  line-height: 1.3; letter-spacing: -0.01em;
}

.ptags { display: flex; flex-wrap: wrap; gap: 4px; }
.ptag {
  font-size: 9px; font-weight: 600; padding: 2px 8px;
  border-radius: 20px; font-family:'Inter', sans-serif; color: #fff;
}
.ptag.PC { background: #5A5D64; }
.ptag.NS  { background: #E0342B; }
.ptag.NS2 { background: #C0282B; }
.ptag.PS4 { background: #2E6DB4; }
.ptag.PS5 { background: #3B82C4; }
.ptag.XBO { background: #2CA243; }
.ptag.XSX { background: #2CA243; }
.ptag.MAC { background: #565A63; }
.ptag.LIN { background: #C9742A; }
.ptag.IOS { background: #565A63; }
.ptag.AND { background: #4C8C3F; }

.card-genre {
  font-size: 10px; color: rgba(255,255,255,0.45);
  display: flex; align-items: center; gap: 4px;
}
.card-genre .mlabel { color: rgba(255,255,255,0.25); }
.card-genre .msep { color: rgba(255,255,255,0.15); }

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto;
  gap: 6px;
}
.card-price { font-size: 10px; color: rgba(255,255,255,0.7); font-weight: 600; }
.card-links { display: flex; align-items: center; gap: 8px; }
.steam-link {
  font-size: 10px; color: #66A8E0; text-decoration: none;
  display: flex; align-items: center; gap: 4px; font-weight: 500;
  transition: color 0.15s; white-space: nowrap;
}
.steam-link:hover { color: #8FC4F5; }
.trailer-btn {
  flex-shrink: 0; font-size: 10px; color: rgba(255,255,255,0.45);
  background: transparent; border: none; cursor: pointer;
  display: flex; align-items: center; gap: 3px;
  font-family: 'Inter', sans-serif; font-weight: 500; padding: 2px 0;
  transition: color 0.15s; white-space: nowrap;
}
.trailer-btn:hover { color: #fff; }

.anticipated-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 9px; font-weight: 600; color: #fff;
  background: #FCA311; border-radius: 20px; padding: 2px 7px;
}

/* TRAILER MODAL */
.trailer-modal {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  align-items: center; justify-content: center;
  padding: 48px 20px;
}
.trailer-modal.open { display: flex; }
.trailer-modal-backdrop {
  position: absolute; inset: 0;
  background: rgba(5,6,9,0.85);
}
.trailer-modal-content {
  position: relative; width: 100%; max-width: 860px;
  background: #000; border-radius: 12px; overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.trailer-modal-close {
  position: absolute; top: -36px; right: 0;
  background: transparent; border: none; color: #fff;
  font-size: 22px; line-height: 1; cursor: pointer; padding: 6px 10px;
  font-family: 'Inter', sans-serif; transition: color 0.15s;
}
.trailer-modal-close:hover { color: rgba(255,255,255,0.6); }
.trailer-modal-body iframe,
.trailer-modal-body video {
  width: 100%; aspect-ratio: 16/9; display: block; border: none; background: #000;
}
.trailer-modal-loading {
  padding: 80px 24px; text-align: center; color: rgba(255,255,255,0.5);
  font-size: 12px; font-weight: 500;
}

/* AD CARD */
.ad-card {
  background: #13151B; border-radius: 10px;
  border: 1px solid #1F2127;
  display: flex; align-items: center; justify-content: center;
  aspect-ratio: unset; min-height: 200px;
  overflow: hidden;
}

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  padding: 48px 24px; text-align: center;
  border: 1px dashed rgba(255,255,255,0.1); border-radius: 18px; display: none;
}
.empty-state.show { display: block; }
.empty-state p { font-size: 10px; color: rgba(255,255,255,0.4); font-weight: 500; margin-bottom: 4px; }
.empty-state span { font-size: 10px; color: rgba(255,255,255,0.25); }

/* CATEGORY DROPDOWN */
.cat-wrap { position: relative; }
.cat-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0; z-index: 200;
  background: #13151B; border: 1px solid #1F2127;
  border-radius: 12px; padding: 12px;
  min-width: 260px; display: none;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}
.cat-dropdown.open { display: block; }
.cat-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-chip {
  font-size: 10px; font-weight: 500; padding: 4px 10px;
  border-radius: 20px; cursor: pointer;
  border: 1.5px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.4);
  font-family: 'Inter', sans-serif;
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  user-select: none;
}
.cat-chip.active {
  color: #fff;
  background: rgba(255,255,255,0.1);
  border-color: rgba(255,255,255,0.35);
}

/* MONTH NAV */
.month-nav-wrap {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 18px 20px 16px;
  background: linear-gradient(180deg, rgba(14,16,21,0) 0%, #0E1015 42%);
}
.month-nav-inner {
  max-width: 1020px; margin: 0 auto;
  display: flex; align-items: center;
  background: rgba(24,26,32,0.94); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px; padding: 15px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.4);
}
.month-nav-label { font-size: 10px; color: #fff; font-weight: 500; flex-shrink: 0; padding-right: 20px; }
.months { display: flex; align-items: center; gap: 10px; margin-left: auto; }
.mnav {
  font-size: 10px; color: rgba(255,255,255,0.3); padding: 0;
  border-radius: 0; cursor: pointer; border: none; background: transparent;
  transition: color 0.15s; font-family: 'Inter', sans-serif; font-weight: 500; line-height: 1;
}
.mnav:hover { color: rgba(255,255,255,0.7); }
.mnav.active { color: #fff; }
.month-sep { color: rgba(255,255,255,0.15); font-size: 10px; user-select: none; }
.month-nav-label { font-size: 10px; color: #fff; font-weight: 500; flex-shrink: 0; padding-right: 20px; margin-right: 0; }
</style>
</head>
<body>

<div class="hero">
  <div class="nav-wrap">
    <div class="nav-card" id="navCard">
      <div class="nav-top">
        <a class="logo" href="#">
          <svg width="22" height="21" viewBox="0 0 22 21" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect y="0.11145" width="3" height="20" fill="white"/>
            <rect x="8" y="0.11145" width="3" height="20" fill="white"/>
            <rect x="16" y="0.417511" width="3" height="20" transform="rotate(-8 16 0.417511)" fill="white"/>
          </svg>
          <span>Loading Archive</span>
        </a>
        <div class="nav-right">
          <a href="#">2026</a>
          <a href="#">Contact</a>
        </div>
      </div>

    </div>
  </div>

  <div class="tagline">
    <h1>Discover the release dates for all the major upcoming video games across every platform</h1>
    <div class="month-pill" id="heroPill">June 2026</div>
    <div class="tagline-arrow">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="side-nav" id="sideNav">
    <div class="side-nav-inner" id="sideNavInner"></div>
  </div>

  <div class="content-area">
    <div class="list-toolbar">
      <input class="list-search" id="searchInput" type="text" placeholder="Search game..." oninput="onSearchInput()">
    </div>

    <div class="platform-bar" id="platformBar">
      <span class="pbar-label">Hardware</span>
    </div>

    <div class="game-grid" id="gameGrid">
      <div class="empty-state" id="emptyState">
        <p>No releases listed yet</p>
        <span>Data syncs in from RAWG &amp; Steam.</span>
      </div>
    </div>
  </div>
</div>

<div class="month-nav-wrap">
  <div class="month-nav-inner">
    <span class="month-nav-label">Month /</span>
    <div class="months" id="monthNav"></div>
  </div>
</div>

<div class="trailer-modal" id="trailerModal">
  <div class="trailer-modal-backdrop" onclick="closeTrailerModal()"></div>
  <div class="trailer-modal-content">
    <button class="trailer-modal-close" onclick="closeTrailerModal()" aria-label="Close">&times;</button>
    <div class="trailer-modal-body" id="trailerModalBody"></div>
  </div>
</div>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];
// Volledige maand namen gebruiken

const PLATFORM_DEFS = [
  { key:"PC",   label:"PC",    cls:"PC"  },
  { key:"NS",   label:"NS",    cls:"NS"  },
  { key:"NS2",  label:"NS2",   cls:"NS2" },
  { key:"PS4",  label:"PS4",   cls:"PS4" },
  { key:"PS5",  label:"PS5",   cls:"PS5" },
  { key:"XBO",  label:"XBO",   cls:"XBO" },
  { key:"XSX",  label:"XBX/S", cls:"XSX" },
];

const CATEGORY_DEFS = [
  "Action","Adventure","RPG","Strategy","Simulation","Sports","Racing",
  "Indie","Casual","Massively Multiplayer","Free to Play","Early Access",
  "Fighting","Horror","Puzzle","Platformer","Shooter","Sandbox",
  "Survival","Stealth","Visual Novel","Card Game","Turn-Based"
];

let activeCats = new Set();
let catDropdownOpen = false;

const CHIP_DEFS = [
  { key:"anticipated", label:"Anticipated", dot:"#D4A017" },
  ...PLATFORM_DEFS,
];

let GAMES = [];
let activeMonth = new Date().getMonth();
let activeFilters = new Set();
let searchSeq = 0;

function mapGame(g, idx) {
  return {
    id: g.id ?? idx,
    title: g.title,
    date: g.date,
    platforms: g.platforms || [],
    genre: g.genre || [],
    dev: g.dev || "",
    anticipated: !!g.anticipated,
    trailer: g.trailer || null,
    steam: g.steam || null,
    price: g.price || null,
    cover: g.cover || null,
  };
}

async function loadGames(monthIdx) {
  const year = 2026;
  const m = String(monthIdx + 1).padStart(2, "0");
  const monthStr = `${year}-${m}`;

  const grid = document.getElementById('gameGrid');
  const empty = document.getElementById('emptyState');
  [...grid.querySelectorAll('.game-card, .ad-card, .loading-row')].forEach(el => el.remove());
  empty.classList.remove('show');

  const loader = document.createElement('div');
  loader.className = 'loading-row';
  loader.style.cssText = 'grid-column:1/-1;padding:48px 24px;text-align:center;font-size:10px;color:rgba(255,255,255,0.3);font-weight:500;';
  loader.textContent = 'Loading releases...';
  grid.appendChild(loader);

  try {
    const res = await fetch(`/api/games?month=${monthStr}`);
    const data = await res.json();
    GAMES = (data.results || []).map(mapGame);
  } catch (e) {
    GAMES = [];
  }

  loader.remove();
  renderGames();
  buildSideNav();
}

function formatDate(str) {
  const d = new Date(str + 'T00:00:00');
  return d.toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' });
}
function getMonth(str) { return parseInt(str.split('-')[1]) - 1; }
function getDay(str) { return parseInt(str.split('-')[2]); }

function buildPlatformBar() {
  const bar = document.getElementById('platformBar');
  bar.innerHTML = '<span class="pbar-label">Hardware</span>';

  PLATFORM_DEFS.forEach(p => {
    const btn = document.createElement('button');
    const isActive = activeFilters.has(p.key);
    btn.className = `pbar-chip ${p.cls}` + (isActive ? ' active' : '');
    btn.innerHTML = `<span class="dot"></span>${p.label}`;
    btn.onclick = () => toggleFilterKey(p.key);
    bar.appendChild(btn);
  });

  // Categorie dropdown
  const catWrap = document.createElement('div');
  catWrap.className = 'cat-wrap';
  catWrap.style.marginLeft = 'auto';

  const activeCatCount = activeCats.size;
  const catBtn = document.createElement('button');
  catBtn.className = 'pbar-chip cat' + (activeCatCount > 0 ? ' active' : '');
  catBtn.id = 'catBtn';
  catBtn.innerHTML = activeCatCount > 0 ? `Categorie (${activeCatCount}) ▾` : 'Categorie ▾';
  catBtn.onclick = (e) => { e.stopPropagation(); toggleCatDropdown(); };

  const dropdown = document.createElement('div');
  dropdown.className = 'cat-dropdown' + (catDropdownOpen ? ' open' : '');
  dropdown.id = 'catDropdown';

  const grid = document.createElement('div');
  grid.className = 'cat-grid';

  CATEGORY_DEFS.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'cat-chip' + (activeCats.has(cat) ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = (e) => { e.stopPropagation(); toggleCat(cat); };
    grid.appendChild(chip);
  });

  dropdown.appendChild(grid);
  catWrap.appendChild(catBtn);
  catWrap.appendChild(dropdown);
  bar.appendChild(catWrap);
}

function toggleCatDropdown() {
  catDropdownOpen = !catDropdownOpen;
  const dd = document.getElementById('catDropdown');
  if (dd) dd.classList.toggle('open', catDropdownOpen);
}

function toggleCat(cat) {
  if (activeCats.has(cat)) activeCats.delete(cat);
  else activeCats.add(cat);
  buildPlatformBar();
  renderGames();
}

// Sluit dropdown bij klik buiten
document.addEventListener('click', () => {
  if (catDropdownOpen) {
    catDropdownOpen = false;
    const dd = document.getElementById('catDropdown');
    if (dd) dd.classList.remove('open');
  }
});

function toggleFilterKey(key) {
  if (activeFilters.has(key)) activeFilters.delete(key);
  else activeFilters.add(key);
  buildPlatformBar();
  renderGames();
}

function buildMonthNav() {
  const nav = document.getElementById('monthNav');
  nav.innerHTML = '';
  MONTHS.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'mnav' + (i === activeMonth ? ' active' : '');
    btn.textContent = m;
    btn.onclick = () => setMonth(i);
    nav.appendChild(btn);
    if (i < MONTHS.length - 1) {
      const sep = document.createElement('span');
      sep.className = 'month-sep';
      sep.textContent = '|';
      nav.appendChild(sep);
    }
  });
}

function setMonth(i) {
  activeMonth = i;
  document.getElementById('heroPill').textContent = MONTHS[i] + ' 2026';
  buildMonthNav();
  loadGames(i);
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return GAMES.filter(g => {
    if (getMonth(g.date) !== activeMonth) return false;
    if (q && !g.title.toLowerCase().includes(q)) return false;
    // Platform filters
    if (activeFilters.size > 0) {
      if (activeFilters.has('anticipated') && !g.anticipated) return false;
      const pf = [...activeFilters].filter(f => f !== 'anticipated');
      if (pf.length > 0 && !pf.some(p => g.platforms.includes(p))) return false;
    }
    // Category filters
    if (activeCats.size > 0) {
      const gameGenres = g.genre.map(gen => gen.toLowerCase());
      const match = [...activeCats].some(cat => gameGenres.some(gen => gen.includes(cat.toLowerCase())));
      if (!match) return false;
    }
    return true;
  });
}

async function onSearchInput() {
  renderGames();

  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!query) return;

  const matchesThisMonth = GAMES.some(g => g.title.toLowerCase().includes(query));
  if (matchesThisMonth) return;

  const mySeq = ++searchSeq;
  const emptyText = document.querySelector('#emptyState p');
  const originalText = emptyText.textContent;
  emptyText.textContent = `Searching upcoming months for "${document.getElementById('searchInput').value}"...`;

  try {
    for (let i = activeMonth + 1; i < MONTHS.length; i++) {
      if (mySeq !== searchSeq) return; // a newer search took over

      const monthStr = `2026-${String(i + 1).padStart(2, '0')}`;
      let monthResults = [];
      try {
        const res = await fetch(`/api/games?month=${monthStr}`);
        const data = await res.json();
        monthResults = data.results || [];
      } catch (e) { /* skip this month on fetch error */ }

      if (mySeq !== searchSeq) return; // a newer search took over

      const found = monthResults.some(g => (g.title || '').toLowerCase().includes(query));
      if (found) {
        const stillSameQuery = document.getElementById('searchInput').value.trim().toLowerCase() === query;
        if (stillSameQuery && mySeq === searchSeq) setMonth(i);
        return;
      }
    }
  } finally {
    if (mySeq === searchSeq) emptyText.textContent = originalText;
  }
}

function renderGames() {
  const grid = document.getElementById('gameGrid');
  const empty = document.getElementById('emptyState');
  [...grid.querySelectorAll('.game-card, .ad-card')].forEach(el => el.remove());
  empty.classList.remove('show');

  const games = getFiltered().sort((a, b) => a.date.localeCompare(b.date));
  if (!games.length) { empty.classList.add('show'); return; }

  const adPositions = [5, 11]; // Na elke ~6 kaartjes een ad

  games.forEach((g, i) => {
    grid.appendChild(buildCard(g));

    // Google Ad na bepaalde posities
    if (adPositions.includes(i + 1)) {
      const adCard = document.createElement('div');
      adCard.className = 'ad-card';
      adCard.innerHTML = `
        <ins class="adsbygoogle"
          style="display:block;width:100%;height:250px;"
          data-ad-client="ca-pub-6965515761301412"
          data-ad-slot="XXXXXXXXXX"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>
        <script>(adsbygoogle = window.adsbygoogle || []).push({});<\/script>`;
      grid.appendChild(adCard);
    }
  });
}

function buildCard(g) {
  const card = document.createElement('div');
  card.className = 'game-card';
  card.id = 'card-' + g.id;

  const ptagsHtml = g.platforms.map(p => {
    const cls = p === 'Android' ? 'AND' : p === 'PC' ? 'PC' : p === 'IOS' ? 'IOS' : p.toUpperCase();
    const label = p === 'XSX' ? 'XSX/S' : p === 'Android' ? 'Droid' : p;
    return `<span class="ptag ${cls}">${label}</span>`;
  }).join('');

  const genreHtml = g.genre.map((gi, i) =>
    `<span>${gi}</span>${i < g.genre.length - 1 ? '<span class="msep"> | </span>' : ''}`
  ).join('');

  card.innerHTML = `
    <div class="card-date">
      <span class="card-date-text">Release date / <span>${formatDate(g.date)}</span></span>
      ${g.anticipated ? `<span class="anticipated-tag">Anticipated ★</span>` : ''}
    </div>
    <div class="card-cover">
      ${g.cover
        ? `<img src="${g.cover}" alt="${g.title}" loading="lazy">`
        : `<div class="card-cover-placeholder"><svg viewBox="0 0 500 500" fill="rgba(255,255,255,0.15)"><path d="M497.49,274.99c.84-8.34,2.51-16.43,2.51-24.99s-1.67-16.66-2.53-25.01h-187.08l132.39-132.37c-10.61-12.98-22.38-24.74-35.34-35.35l-132.42,132.4V2.53C266.66,1.67,258.57,0,250,0s-16.65,1.67-24.99,2.51v187.15L92.59,57.24c-12.98,10.62-24.74,22.39-35.35,35.36l132.4,132.39H2.52c-.84,8.35-2.52,16.44-2.52,25.01s1.68,16.65,2.51,24.99h187.17L57.24,407.41c10.61,12.99,22.38,24.74,35.36,35.35l132.41-132.4v187.12c8.34.84,16.43,2.51,24.99,2.51s16.66-1.67,25.01-2.53v-187.11l132.4,132.4c12.98-10.62,24.74-22.39,35.35-35.36l-132.42-132.41h187.15Z"/></svg></div>`
      }
    </div>
    <div class="card-body">
      <div class="card-title">${g.title}</div>
      <div class="ptags">${ptagsHtml}</div>
      <div class="card-genre"><span class="mlabel">Genre /</span> ${genreHtml}</div>
      <div class="card-footer">
        <div class="card-links">
          ${g.price ? `<span class="card-price">${g.price}</span>` : ''}
          ${g.steam ? `<a class="steam-link" href="https://store.steampowered.com/app/${g.steam}" target="_blank"><svg width="11" height="11" viewBox="0 0 24 24" fill="currentColor"><path d="M11.98 2C6.65 2 2.28 6.13 2 11.4l5.36 2.22a3 3 0 0 1 1.7-.53l2.38-3.46v-.05a4 4 0 1 1 4 4h-.1l-3.4 2.43a3 3 0 1 1-5.95.66L2 15.43A10 10 0 1 0 11.98 2zm-3.6 15.18l-1.23-.51a2.25 2.25 0 1 0 1.4-1.4l1.27.53a1.66 1.66 0 1 1-1.44 1.38zM18 9.5a2.66 2.66 0 1 0-2.66 2.66h.04A2.66 2.66 0 0 0 18 9.5zm-4.66 0a2 2 0 1 1 2 2 2 2 0 0 1-2-2z"/></svg> Steam page</a>` : ''}
        </div>
        ${g.trailer ? `<button class="trailer-btn" onclick="openTrailerModal('${g.trailer}')">Trailer <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg></button>` : ''}
      </div>
    </div>
  `;
  return card;
}

async function openTrailerModal(trailerId) {
  const modal = document.getElementById('trailerModal');
  const body = document.getElementById('trailerModalBody');

  body.innerHTML = '<div class="trailer-modal-loading">Loading trailer...</div>';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (trailerId.startsWith('steam:')) {
    const appid = trailerId.slice('steam:'.length);
    try {
      const res = await fetch(`/api/trailer?appid=${appid}`);
      const data = await res.json();
      if (!modal.classList.contains('open')) return; // user closed it while we were loading

      if (data.mp4) {
        body.innerHTML = `<video controls autoplay playsinline src="${data.mp4}"></video>`;
      } else if (data.hls) {
        body.innerHTML = '<video controls autoplay playsinline></video>';
        attachHls(body.querySelector('video'), data.hls);
      } else {
        body.innerHTML = '<div class="trailer-modal-loading">No trailer found.</div>';
      }
    } catch (e) {
      if (modal.classList.contains('open')) body.innerHTML = '<div class="trailer-modal-loading">Could not load trailer.</div>';
    }
    return;
  }

  body.innerHTML = `<iframe src="https://www.youtube.com/embed/${trailerId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen loading="lazy"></iframe>`;
}

function attachHls(video, url) {
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url; // Safari/iOS play HLS natively
    return;
  }
  if (window.Hls && window.Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    video._hls = hls;
  }
}

function closeTrailerModal() {
  const modal = document.getElementById('trailerModal');
  const body = document.getElementById('trailerModalBody');
  modal.classList.remove('open');
  document.body.style.overflow = '';
  const video = body.querySelector('video');
  if (video) {
    video.pause();
    if (video._hls) video._hls.destroy();
  }
  body.innerHTML = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeTrailerModal();
});

function buildSideNav() {
  const inner = document.getElementById('sideNavInner');
  inner.innerHTML = '';
  const totalDays = new Date(2026, activeMonth + 1, 0).getDate();
  const navH = 330;
  const tickSpacing = navH / (totalDays - 1);
  let currentIdx = -1;
  let dragging = false, startY = 0, startIdx = 0;

  for (let i = 0; i < totalDays; i++) {
    const isWeekStart = i % 7 === 0;
    const tick = document.createElement('div');
    tick.id = 'sn-tick-' + i;
    tick.style.cssText = `position:absolute;right:0;top:${i * tickSpacing}px;width:${isWeekStart ? 18 : 10}px;height:1.5px;border-radius:1px;background:rgba(255,255,255,0.2);transform:translateY(-50%);transition:background 0.1s,height 0.1s,width 0.1s;`;
    inner.appendChild(tick);
  }

  const label = document.createElement('div');
  label.className = 'sn-label';
  label.id = 'sn-label';
  label.style.top = '0px';
  label.textContent = 'W1/D1';
  inner.appendChild(label);

  function setActiveDay(idx) {
    idx = Math.max(0, Math.min(totalDays - 1, idx));
    if (currentIdx >= 0) {
      const old = document.getElementById('sn-tick-' + currentIdx);
      if (old) { const w = currentIdx % 7 === 0; old.style.width = (w ? 18 : 10) + 'px'; old.style.height = '1.5px'; old.style.background = 'rgba(255,255,255,0.2)'; }
    }
    currentIdx = idx;
    const tick = document.getElementById('sn-tick-' + idx);
    if (tick) { tick.style.width = '28px'; tick.style.height = '2.5px'; tick.style.background = '#ffffff'; }
    const week = Math.floor(idx / 7) + 1;
    label.style.top = (idx * tickSpacing) + 'px';
    label.textContent = `W${week}/D${idx + 1}`;
  }

  setActiveDay(0);

  inner.addEventListener('mousedown', e => { dragging = true; startY = e.clientY; startIdx = currentIdx; e.preventDefault(); });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientY - startY;
    const newIdx = Math.max(0, Math.min(totalDays - 1, startIdx + Math.round(delta / tickSpacing)));
    setActiveDay(newIdx);
    const pct = newIdx / (totalDays - 1);
    window.scrollTo({ top: pct * (document.body.scrollHeight - window.innerHeight), behavior: 'instant' });
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  window.addEventListener('scroll', () => {
    const navCard = document.getElementById('navCard');
    if (window.scrollY > 50) navCard.classList.add('scrolled');
    else navCard.classList.remove('scrolled');
    if (dragging) return;
    const pct = window.scrollY / Math.max(1, document.body.scrollHeight - window.innerHeight);
    setActiveDay(Math.round(pct * (totalDays - 1)));
  }, { passive: true });
}

// Init
document.getElementById('heroPill').textContent = MONTHS[activeMonth] + ' 2026';
buildPlatformBar();
buildMonthNav();
loadGames(activeMonth);
</script>
