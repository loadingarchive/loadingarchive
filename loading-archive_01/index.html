<html lang="en">
<head>

<meta name="description" content="Bekijk releasedatums van alle grote aankomende games op elk platform — PC, PlayStation, Xbox en Switch.">

<style>
:root {
  --bg:         #0E1015;
  --surface:    #13151B;
  --border:     #1F2127;
  --blue:       #66A8E0;
  --blue-hover: #8FC4F5;
  --gold:       #CFAF5A;
  --dim:        rgba(255,255,255,0.35);
  --dimmer:     rgba(255,255,255,0.15);
  --pill:       20px;
  --xs:         10px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: 'Inter', sans-serif;
  background: var(--bg);
  color: #fff;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}
button, select, input { font-family: inherit; }

/* NAV */
.nav-wrap {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  max-width: 1020px; margin: 0 auto;
  padding: 16px 20px 0;
}
.nav-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 22px;
  padding: 11px 20px;
  transition: box-shadow 0.3s ease;
  overflow: hidden;
}
.nav-card.scrolled { box-shadow: 0 12px 32px rgba(0,0,0,0.5), 0 4px 12px rgba(0,0,0,0.3); }
.nav-top { display: flex; align-items: center; justify-content: space-between; }
.logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
.logo svg { width: 22px; height: 22px; flex-shrink: 0; }
.logo span { font-size: 15px; font-weight: 600; color: #fff; letter-spacing: 0.01em; }
.nav-right { display: flex; align-items: center; gap: 18px; }
.nav-right a { font-size: var(--xs); color: rgba(255,255,255,0.55); text-decoration: none; font-weight: 500; }
.nav-right a:hover { color: #fff; }

/* HERO */
.hero {
  background: url('assets/header-bg.jpg') center center / cover no-repeat;
  height: 720px;
  display: flex; flex-direction: column;
  position: relative;
  padding-top: 68px;
}
.tagline {
  text-align: center;
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: flex-end;
  padding: 0 20px 60px;
  max-width: 660px; margin: 0 auto; width: 100%;
}
.tagline h1 {
  font-size: 25px; font-weight: 600; color: #fff;
  line-height: 1.32; max-width: 470px; margin: 0 auto 22px;
  letter-spacing: -0.015em;
}
.month-pill {
  display: inline-flex; align-items: center; justify-content: center;
  font-size: var(--xs); font-weight: 400;
  border: 1px solid rgba(255,255,255,0.4);
  border-radius: 10px; padding: 6px 18px; color: #fff; margin-bottom: 8px;
}
.tagline-arrow { display: flex; justify-content: center; }

/* MAIN LAYOUT */
.main-wrap {
  max-width: 1020px; margin: -30px auto 0;
  padding: 0 20px 140px;
  position: relative;
  display: flex;
  gap: 24px;
}

/* SIDE NAV */
.side-nav {
  position: absolute; left: -70px; top: 80px; bottom: 140px;
  width: 50px; flex-shrink: 0;
}
.side-nav-inner {
  position: sticky; top: 96px; height: 330px; width: 50px;
  cursor: grab; user-select: none;
}
.side-nav-inner:active { cursor: grabbing; }
.sn-label {
  position: absolute; right: 36px;
  font-size: var(--xs); color: rgba(255,255,255,0.9); font-weight: 500;
  white-space: nowrap;
  display: flex; align-items: center; gap: 6px;
  transform: translateY(-50%); transition: top 0.08s ease;
  pointer-events: none;
}
.sn-label::after { content: ''; display: block; width: 10px; height: 1px; background: rgba(255,255,255,0.7); }

/* CONTENT AREA */
.content-area { flex: 1; min-width: 0; }

/* SEARCH + FILTER BAR */
.list-toolbar {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 16px; margin-top: 60px;
}
.list-search {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 9px 14px;
  color: #fff; font-size: var(--xs); outline: none;
  transition: border-color 0.15s;
}
.list-search::placeholder { color: rgba(255,255,255,0.28); }
.list-search:focus { border-color: rgba(255,255,255,0.2); }

.platform-bar {
  display: flex; align-items: center; gap: 6px; flex-wrap: wrap;
  margin-bottom: 20px;
}
.pbar-label { font-size: var(--xs); color: var(--dim); font-weight: 500; margin-right: 4px; }
.pbar-chip {
  font-size: var(--xs); font-weight: 600; padding: 4px 12px;
  border-radius: var(--pill); cursor: pointer; border: 1.5px solid transparent;
  color: var(--dim); background: rgba(255,255,255,0.05);
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  user-select: none; display: flex; align-items: center; gap: 5px;
}
.pbar-chip .dot { width: 8px; height: 8px; border-radius: 50%; background: transparent; border: 1.5px solid rgba(255,255,255,0.3); transition: background 0.15s, border-color 0.15s; }
.pbar-chip.active { color: #fff; }
.pbar-chip.active .dot { border-color: transparent; }
.pbar-chip.active.PC  { background: rgba(90,93,100,0.3); border-color: #5A5D64; }
.pbar-chip.active.PC  .dot { background: #A0A3AA; }
.pbar-chip.active.NS  { background: rgba(224,52,43,0.2); border-color: #E0342B; }
.pbar-chip.active.NS  .dot { background: #E0342B; }
.pbar-chip.active.NS2 { background: rgba(192,40,43,0.2); border-color: #C0282B; }
.pbar-chip.active.NS2 .dot { background: #E03030; }
.pbar-chip.active.PS4 { background: rgba(46,109,180,0.2); border-color: #2E6DB4; }
.pbar-chip.active.PS4 .dot { background: #2E6DB4; }
.pbar-chip.active.PS5 { background: rgba(59,130,196,0.2); border-color: #3B82C4; }
.pbar-chip.active.PS5 .dot { background: #3B82C4; }
.pbar-chip.active.XBO,
.pbar-chip.active.XSX { background: rgba(44,162,67,0.2); border-color: #2CA243; }
.pbar-chip.active.XBO .dot,
.pbar-chip.active.XSX .dot { background: #2CA243; }
.pbar-sep { color: var(--dimmer); font-size: var(--xs); user-select: none; }
.pbar-chip.active.ANTICIPATED { background: rgba(207,175,90,0.2); border-color: var(--gold); }
.pbar-chip.active.ANTICIPATED .dot { background: linear-gradient(90deg, #B98F1D, var(--gold)); }
.pbar-chip.cat { color: var(--dim); border-color: rgba(255,255,255,0.12); }
.pbar-chip.cat.active { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.3); }

/* GAME GRID */
.game-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
@media (max-width: 900px) {
  .game-grid { grid-template-columns: repeat(2, 1fr); }
  .side-nav { display: none; }
}
@media (max-width: 600px) { .game-grid { grid-template-columns: 1fr; } }

/* CARD DATE */
.card-date {
  font-size: var(--xs); color: var(--dim);
  display: flex; align-items: center; justify-content: space-between; gap: 6px;
}
.card-date-text { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.card-date-text span { color: rgba(255,255,255,0.65); }
.card-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
.card-action-btn {
  background: none; border: none; color: rgba(255,255,255,0.3);
  cursor: pointer; padding: 0; font-size: 13px; line-height: 1;
  transition: color 0.15s;
  position: relative;
}
.card-action-btn:hover        { color: rgba(255,255,255,0.75); }
.card-action-anticipated      { color: var(--gold); }
.card-action-anticipated:hover { color: #E8CC7A; }
.card-action-rerelease        { color: var(--blue); }
.card-action-rerelease:hover  { color: var(--blue-hover); }

/* Global fixed tooltip — rendered outside any overflow:hidden context */
#site-tooltip {
  position: fixed;
  background: #16181f;
  border: 1px solid var(--border);
  border-radius: 6px;
  color: rgba(255,255,255,0.75);
  font-size: 10px; font-weight: 500; font-family: 'Inter', sans-serif;
  letter-spacing: 0.01em;
  padding: 4px 9px;
  white-space: nowrap;
  pointer-events: none;
  opacity: 0;
  transition: opacity 0.12s;
  z-index: 9999;
  transform: translateX(-50%);
}
#site-tooltip.show { opacity: 1; }
#site-tooltip.anticipated { border-color: rgba(207,175,90,0.4); }
#site-tooltip.rerelease   { border-color: rgba(102,168,224,0.4); }

/* GAME CARD */
.game-card {
  background: var(--surface); border-radius: 10px;
  border: 1px solid var(--border);
  transition: border-color 0.15s;
  display: flex; flex-direction: column;
  padding: 15px; gap: 10px;
  aspect-ratio: 330 / 300;
  overflow: hidden; position: relative;
}
.game-card:hover { border-color: #2c2f3a; z-index: 2; }

.card-cover {
  width: 100%; aspect-ratio: 460/215;
  overflow: hidden; flex-shrink: 0; border-radius: 5px;
  background: linear-gradient(135deg, #1a1d27 0%, #232630 100%);
}
.card-cover img { width: 100%; height: 100%; object-fit: cover; display: block; }

.card-body { flex: 1; display: flex; flex-direction: column; gap: 9px; }

.card-title {
  font-size: 16px; font-weight: 700; color: #fff;
  line-height: 1.3; letter-spacing: -0.02em;
  overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}

.ptags { display: flex; flex-wrap: wrap; gap: 4px; }
.ptag {
  font-size: 9px; font-weight: 600; padding: 2px 8px;
  border-radius: var(--pill);
  color: rgba(255,255,255,0.75);
  background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.1);
}

.card-genre {
  font-size: var(--xs); color: rgba(255,255,255,0.45);
  display: flex; align-items: center; gap: 4px;
}
.card-genre .mlabel { color: rgba(255,255,255,0.25); }

.card-footer {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: auto; gap: 6px;
}
.card-price { font-size: var(--xs); color: rgba(255,255,255,0.7); font-weight: 600; }
.card-links { display: flex; align-items: center; gap: 8px; }
.steam-link {
  font-size: var(--xs); color: var(--blue); text-decoration: none;
  font-weight: 500; transition: color 0.15s; white-space: nowrap;
}
.steam-link:hover { color: var(--blue-hover); }
.trailer-link {
  flex-shrink: 0; font-size: var(--xs); color: rgba(255,255,255,0.65); font-weight: 500;
  background: none; border: none; cursor: pointer;
  white-space: nowrap; transition: color 0.15s; padding: 0;
}
.trailer-link:hover { color: #fff; }

/* TRAILER MODAL */
.trailer-modal {
  display: none;
  position: fixed; inset: 0; z-index: 1000;
  align-items: center; justify-content: center;
  padding: 48px 20px;
}
.trailer-modal.open { display: flex; }
.trailer-modal-backdrop { position: absolute; inset: 0; background: rgba(5,6,9,0.85); }
.trailer-modal-content {
  position: relative; width: 100%; max-width: 860px;
  background: #000; border-radius: 12px; overflow: hidden;
  box-shadow: 0 24px 64px rgba(0,0,0,0.6);
}
.trailer-modal-close {
  position: absolute; top: -36px; right: 0;
  background: transparent; border: none; color: #fff;
  font-size: 22px; line-height: 1; cursor: pointer; padding: 6px 10px;
  transition: color 0.15s;
}
.trailer-modal-close:hover { color: rgba(255,255,255,0.6); }
.trailer-modal-quality {
  position: absolute; top: -36px; left: 0; display: none;
  background: var(--surface); border: 1px solid rgba(255,255,255,0.15); border-radius: 6px;
  color: #fff; font-size: 11px; font-weight: 500;
  padding: 5px 8px; cursor: pointer; outline: none;
}
.trailer-modal-quality.show { display: block; }
.trailer-modal-body iframe,
.trailer-modal-body video { width: 100%; aspect-ratio: 16/9; display: block; border: none; background: #000; }
.trailer-modal-loading {
  padding: 80px 24px; text-align: center; color: rgba(255,255,255,0.5);
  font-size: 12px; font-weight: 500;
}

/* AD CARD */
.ad-card {
  background: var(--surface); border-radius: 10px;
  border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  min-height: 200px; overflow: hidden;
}

/* EMPTY STATE */
.empty-state {
  grid-column: 1 / -1;
  padding: 48px 24px; text-align: center;
  border: 1px dashed rgba(255,255,255,0.1); border-radius: 18px; display: none;
}
.empty-state.show { display: block; }
.empty-state p    { font-size: var(--xs); color: rgba(255,255,255,0.4); font-weight: 500; margin-bottom: 4px; }
.empty-state span { font-size: var(--xs); color: rgba(255,255,255,0.25); }

/* CATEGORY DROPDOWN */
.cat-wrap { position: relative; }
.cat-dropdown {
  position: absolute; top: calc(100% + 8px); right: 0; z-index: 200;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 12px; padding: 12px;
  min-width: 260px; display: none;
  box-shadow: 0 12px 32px rgba(0,0,0,0.5);
}
.cat-dropdown.open { display: block; }
.cat-grid { display: flex; flex-wrap: wrap; gap: 6px; }
.cat-chip {
  font-size: var(--xs); font-weight: 500; padding: 4px 10px;
  border-radius: var(--pill); cursor: pointer;
  border: 1.5px solid var(--dimmer);
  background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.4);
  transition: color 0.15s, background 0.15s, border-color 0.15s;
  user-select: none;
}
.cat-chip.active { color: #fff; background: rgba(255,255,255,0.1); border-color: rgba(255,255,255,0.35); }

/* MONTH NAV */
.month-nav-wrap {
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  padding: 18px 20px 16px;
  background: linear-gradient(180deg, rgba(14,16,21,0) 0%, var(--bg) 42%);
}
.month-nav-inner {
  max-width: 1020px; margin: 0 auto;
  display: flex; align-items: center;
  background: rgba(24,26,32,0.94); backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08);
  border-radius: 100px; padding: 15px;
  box-shadow: 0 8px 28px rgba(0,0,0,0.4);
}
.month-nav-label { font-size: var(--xs); color: #fff; font-weight: 500; flex-shrink: 0; padding-right: 20px; }
.months {
  display: flex; align-items: center; gap: 10px; margin-left: auto;
  overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none;
}
.months::-webkit-scrollbar { display: none; }
.mnav {
  font-size: var(--xs); color: rgba(255,255,255,0.3); padding: 0;
  border-radius: 0; cursor: pointer; border: none; background: transparent;
  transition: color 0.15s; font-weight: 500; line-height: 1; flex-shrink: 0;
}
.mnav:hover { color: rgba(255,255,255,0.7); }
.mnav.active { color: #fff; }
.month-sep { color: var(--dimmer); font-size: var(--xs); user-select: none; flex-shrink: 0; }
</style>
</head>
<body>

<div class="hero">
  <div class="nav-wrap">
    <div class="nav-card" id="navCard">
      <div class="nav-top">
        <a class="logo" href="#">
          <svg width="22" height="21" viewBox="0 0 22 21" fill="none" xmlns="http://www.w3.org/2000/svg">
            <rect y="0.11145" width="3" height="20" fill="white"/>
            <rect x="8" y="0.11145" width="3" height="20" fill="white"/>
            <rect x="16" y="0.417511" width="3" height="20" transform="rotate(-8 16 0.417511)" fill="white"/>
          </svg>
          <span>Loading Archive</span>
        </a>
        <div class="nav-right">
          <a href="#">2026</a>
          <a href="mailto:loadingarchive@outlook.com">Contact</a>
        </div>
      </div>

    </div>
  </div>

  <div class="tagline">
    <h1>Discover the release dates for all the major upcoming video games across every platform</h1>
    <div class="month-pill" id="heroPill">June 2026</div>
    <div class="tagline-arrow">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="rgba(255,255,255,0.5)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"></polyline></svg>
    </div>
  </div>
</div>

<div class="main-wrap">
  <div class="side-nav" id="sideNav">
    <div class="side-nav-inner" id="sideNavInner"></div>
  </div>

  <div class="content-area">
    <div class="list-toolbar">
      <input class="list-search" id="searchInput" type="text" placeholder="Search game..." oninput="onSearchInput()">
    </div>

    <div class="platform-bar" id="platformBar">
      <span class="pbar-label">Hardware</span>
    </div>

    <div class="game-grid" id="gameGrid">
      <div class="empty-state" id="emptyState">
        <p>No releases listed yet</p>
        <span>Data syncs in from RAWG &amp; Steam.</span>
      </div>

</div>

  <div class="month-nav-inner">
    <span class="month-nav-label">Month /</span>
    <div class="months" id="monthNav"></div>
  </div>
</div>

<div class="trailer-modal" id="trailerModal">
  <div class="trailer-modal-backdrop" onclick="closeTrailerModal()"></div>
  <div class="trailer-modal-content">
    <select class="trailer-modal-quality" id="trailerQuality" onchange="setTrailerQuality(this.value)" aria-label="Video quality"></select>
    <button class="trailer-modal-close" onclick="closeTrailerModal()" aria-label="Close">&times;</button>
    <div class="trailer-modal-body" id="trailerModalBody"></div>
  </div>
</div>

<script>
const MONTHS = ["January","February","March","April","May","June","July","August","September","October","November","December"];

const PLATFORM_DEFS = [
  { key:"PC",  label:"PC",    cls:"PC"  },
  { key:"NS",  label:"NS",    cls:"NS"  },
  { key:"NS2", label:"NS2",   cls:"NS2" },
  { key:"PS4", label:"PS4",   cls:"PS4" },
  { key:"PS5", label:"PS5",   cls:"PS5" },
  { key:"XBO", label:"XBO",   cls:"XBO" },
  { key:"XSX", label:"XBX/S", cls:"XSX" },
];

const CATEGORY_DEFS = [
  "Action","Adventure","RPG","Strategy","Simulation","Sports","Racing",
  "Indie","Casual","Massively Multiplayer","Free to Play","Early Access",
  "Fighting","Horror","Puzzle","Platformer","Shooter","Sandbox",
  "Survival","Stealth","Visual Novel","Card Game","Turn-Based"
];

// Cached DOM refs
const gameGrid   = document.getElementById('gameGrid');
const emptyState = document.getElementById('emptyState');

let activeCats = new Set();
let catDropdownOpen = false;
let GAMES = [];
let activeMonth = new Date().getMonth();
let tbaMode = false;
let activeFilters = new Set();
let searchSeq = 0;
let loadSeq = 0;

function mapGame(g, idx) {
  return {
    id: g.id ?? idx,
    title: g.title,
    date: g.date,
    platforms: g.platforms || [],
    genre: g.genre || [],
    dev: g.dev || "",
    anticipated: !!g.anticipated,
    trailer: g.trailer || null,
    steam: g.steam || null,
    price: g.price || null,
    cover: g.cover || null,
    rerelease: g.rerelease || null,
  };
}

function parseDate(str) { return new Date(str + 'T00:00:00'); }
function formatDate(str) { return parseDate(str).toLocaleDateString('en-US', { month:'long', day:'numeric', year:'numeric' }); }
function formatDateShort(str) { return parseDate(str).toLocaleDateString('en-US', { month:'short', year:'numeric' }); }
function getMonth(str) { return parseInt(str.split('-')[1]) - 1; }

function toggleSet(set, key) {
  set.has(key) ? set.delete(key) : set.add(key);
  buildPlatformBar();
  renderGames();
}
function toggleCat(cat) { toggleSet(activeCats, cat); }
function toggleFilterKey(key) { toggleSet(activeFilters, key); }

async function fetchAndRenderGames(url, loadingText) {
  const mySeq = ++loadSeq;
  [...gameGrid.querySelectorAll('.game-card, .ad-card, .loading-row')].forEach(el => el.remove());
  emptyState.classList.remove('show');

  const loader = document.createElement('div');
  loader.className = 'loading-row';
  loader.style.cssText = 'grid-column:1/-1;padding:48px 24px;text-align:center;font-size:10px;color:rgba(255,255,255,0.3);font-weight:500;';
  loader.textContent = loadingText;
  gameGrid.appendChild(loader);

  let results;
  try {
    const res = await fetch(url);
    const data = await res.json();
    results = data.results || [];
  } catch (e) {
    results = [];
  }

  if (mySeq !== loadSeq) return;
  GAMES = results.map(mapGame);
  loader.remove();
  renderGames();
}

async function loadGames(monthIdx) {
  const m = String(monthIdx + 1).padStart(2, "0");
  await fetchAndRenderGames(`/api/games?month=2026-${m}`, 'Loading releases...');
  buildSideNav();
}

async function loadTba() {
  await fetchAndRenderGames('/api/games?tba=1', 'Loading announced games...');
}

function buildPlatformBar() {
  const bar = document.getElementById('platformBar');
  bar.innerHTML = '<span class="pbar-label">Hardware</span>';

  PLATFORM_DEFS.forEach(p => {
    const btn = document.createElement('button');
    btn.className = `pbar-chip ${p.cls}` + (activeFilters.has(p.key) ? ' active' : '');
    btn.innerHTML = `<span class="dot"></span>${p.label}`;
    btn.onclick = () => toggleFilterKey(p.key);
    bar.appendChild(btn);
  });

  const sep = document.createElement('span');
  sep.className = 'pbar-sep';
  sep.textContent = '|';
  bar.appendChild(sep);

  const anticipatedBtn = document.createElement('button');
  anticipatedBtn.className = 'pbar-chip ANTICIPATED' + (activeFilters.has('anticipated') ? ' active' : '');
  anticipatedBtn.innerHTML = `<span class="dot"></span>Anticipated`;
  anticipatedBtn.onclick = () => toggleFilterKey('anticipated');
  bar.appendChild(anticipatedBtn);

  const catWrap = document.createElement('div');
  catWrap.className = 'cat-wrap';
  catWrap.style.marginLeft = 'auto';

  const catBtn = document.createElement('button');
  catBtn.className = 'pbar-chip cat' + (activeCats.size > 0 ? ' active' : '');
  catBtn.id = 'catBtn';
  catBtn.innerHTML = activeCats.size > 0 ? `Categorie (${activeCats.size}) ▾` : 'Categorie ▾';
  catBtn.onclick = (e) => { e.stopPropagation(); toggleCatDropdown(); };

  const dropdown = document.createElement('div');
  dropdown.className = 'cat-dropdown' + (catDropdownOpen ? ' open' : '');
  dropdown.id = 'catDropdown';

  const catGrid = document.createElement('div');
  catGrid.className = 'cat-grid';
  CATEGORY_DEFS.forEach(cat => {
    const chip = document.createElement('button');
    chip.className = 'cat-chip' + (activeCats.has(cat) ? ' active' : '');
    chip.textContent = cat;
    chip.onclick = (e) => { e.stopPropagation(); toggleCat(cat); };
    catGrid.appendChild(chip);
  });

  dropdown.appendChild(catGrid);
  catWrap.appendChild(catBtn);
  catWrap.appendChild(dropdown);
  bar.appendChild(catWrap);
}

function toggleCatDropdown() {
  catDropdownOpen = !catDropdownOpen;
  const dd = document.getElementById('catDropdown');
  if (dd) dd.classList.toggle('open', catDropdownOpen);
}

document.addEventListener('click', () => {
  if (catDropdownOpen) {
    catDropdownOpen = false;
    const dd = document.getElementById('catDropdown');
    if (dd) dd.classList.remove('open');
  }
});

function buildMonthNav() {
  const nav = document.getElementById('monthNav');
  nav.innerHTML = '';
  MONTHS.forEach((m, i) => {
    const btn = document.createElement('button');
    btn.className = 'mnav' + (!tbaMode && i === activeMonth ? ' active' : '');
    btn.textContent = m;
    btn.onclick = () => setMonth(i);
    nav.appendChild(btn);
    const sep = document.createElement('span');
    sep.className = 'month-sep';
    sep.textContent = '|';
    nav.appendChild(sep);
  });
  const tbaBtn = document.createElement('button');
  tbaBtn.className = 'mnav' + (tbaMode ? ' active' : '');
  tbaBtn.textContent = 'TBA';
  tbaBtn.onclick = () => setTba();
  nav.appendChild(tbaBtn);
}

function setMonth(i) {
  tbaMode = false;
  activeMonth = i;
  document.getElementById('heroPill').textContent = MONTHS[i] + ' 2026';
  document.getElementById('sideNav').style.display = '';
  buildMonthNav();
  loadGames(i);
}

function setTba() {
  tbaMode = true;
  document.getElementById('heroPill').textContent = 'Announced — No Date Yet';
  document.getElementById('sideNav').style.display = 'none';
  buildMonthNav();
  loadTba();
}

function stepMonth(delta) {
  const current = tbaMode ? MONTHS.length : activeMonth;
  const next = current + delta;
  if (next < 0 || next > MONTHS.length) return;
  if (next === MONTHS.length) setTba(); else setMonth(next);
}

function setupMonthSwipe() {
  const el = document.getElementById('monthNav');
  let startX = 0, startY = 0, tracking = false;
  el.addEventListener('touchstart', e => {
    if (e.touches.length !== 1) return;
    startX = e.touches[0].clientX;
    startY = e.touches[0].clientY;
    tracking = true;
  }, { passive: true });
  el.addEventListener('touchend', e => {
    if (!tracking) return;
    tracking = false;
    const touch = e.changedTouches[0];
    const deltaX = touch.clientX - startX;
    const deltaY = touch.clientY - startY;
    if (Math.abs(deltaX) < 50 || Math.abs(deltaX) < Math.abs(deltaY) * 1.5) return;
    stepMonth(deltaX < 0 ? 1 : -1);
  }, { passive: true });
}

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return GAMES.filter(g => {
    if (!tbaMode && getMonth(g.date) !== activeMonth) return false;
    if (q && !g.title.toLowerCase().includes(q)) return false;
    if (activeFilters.size > 0) {
      if (activeFilters.has('anticipated') && !g.anticipated) return false;
      const pf = [...activeFilters].filter(f => f !== 'anticipated');
      if (pf.length > 0 && !pf.some(p => g.platforms.includes(p))) return false;
    }
    if (activeCats.size > 0) {
      const gameGenres = g.genre.map(gen => gen.toLowerCase());
      if (![...activeCats].some(cat => gameGenres.some(gen => gen.includes(cat.toLowerCase())))) return false;
    }
    return true;
  });
}

async function onSearchInput() {
  renderGames();
  if (tbaMode) return;
  const query = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!query || GAMES.some(g => g.title.toLowerCase().includes(query))) return;

  const mySeq = ++searchSeq;
  const emptyText = document.querySelector('#emptyState p');
  const originalText = emptyText.textContent;
  emptyText.textContent = `Searching upcoming months for "${document.getElementById('searchInput').value}"...`;

  try {
    for (let i = activeMonth + 1; i < MONTHS.length; i++) {
      if (mySeq !== searchSeq) return;
      let monthResults = [];
      try {
        const res = await fetch(`/api/games?month=2026-${String(i + 1).padStart(2, '0')}`);
        const data = await res.json();
        monthResults = data.results || [];
      } catch (e) { /* skip on fetch error */ }
      if (mySeq !== searchSeq) return;
      if (monthResults.some(g => (g.title || '').toLowerCase().includes(query))) {
        if (document.getElementById('searchInput').value.trim().toLowerCase() === query && mySeq === searchSeq) setMonth(i);
        return;
      }
    }
  } finally {
    if (mySeq === searchSeq) emptyText.textContent = originalText;
  }
}

function renderGames() {
  [...gameGrid.querySelectorAll('.game-card, .ad-card')].forEach(el => el.remove());
  emptyState.classList.remove('show');

  const games = getFiltered().sort((a, b) => tbaMode ? 0 : a.date.localeCompare(b.date));
  if (!games.length) { emptyState.classList.add('show'); return; }

  const adPositions = [5, 11];
  games.forEach((g, i) => {
    gameGrid.appendChild(buildCard(g));
    if (adPositions.includes(i + 1)) {
      const adCard = document.createElement('div');
      adCard.className = 'ad-card';
      adCard.innerHTML = `
        <ins class="adsbygoogle"
          style="display:block;width:100%;height:250px;"
          data-ad-client="ca-pub-6965515761301412"
          data-ad-slot="3703289900"
          data-ad-format="auto"
          data-full-width-responsive="true"></ins>`;
      gameGrid.appendChild(adCard);
      (window.adsbygoogle = window.adsbygoogle || []).push({});
    }
  });
}

function platformTag(p) {
  const cls   = p === 'Android' ? 'AND' : p === 'IOS' ? 'IOS' : p.toUpperCase();
  const label = p === 'XSX' ? 'XSX/S' : p === 'Android' ? 'Droid' : p;
  return `<span class="ptag ${cls}">${label}</span>`;
}

function buildCard(g) {
  const card = document.createElement('div');
  card.className = 'game-card';
  card.id = 'card-' + g.id;

  const ptagsHtml = g.platforms.map(platformTag).join('');
  const genreHtml = g.genre.map(gi => `<span>${gi}</span>`).join(' ');

  card.innerHTML = `
    <div class="card-date">
      <span class="card-date-text">Release date / <span>${g.date ? formatDate(g.date) : 'TBA'}</span></span>
      <span class="card-actions">
        ${g.rerelease  ? `<button class="card-action-btn card-action-rerelease"   data-tooltip="Re-release · orig. ${formatDateShort(g.rerelease.date)}">↺</button>` : ''}
        ${g.anticipated ? `<button class="card-action-btn card-action-anticipated" data-tooltip="Anticipated">✦</button>` : ''}
        <button class="card-action-btn" data-tooltip="More">⋮</button>
      </span>
    </div>
    ${g.cover ? `<div class="card-cover"><img src="${g.cover}" alt="${g.title}" loading="lazy"></div>` : ''}
    <div class="card-body">
      <div class="card-title">${g.title}</div>
      <div class="ptags">${ptagsHtml}</div>
      <div class="card-genre"><span class="mlabel">Genre /</span> ${genreHtml}</div>
      <div class="card-footer">
        <div class="card-links">
          ${g.price ? `<span class="card-price">${g.price}</span>` : ''}
          ${g.steam ? `<a class="steam-link" href="https://store.steampowered.com/app/${g.steam}" target="_blank">Steam page ›</a>` : ''}
        </div>
        ${g.trailer ? `<button class="trailer-link" onclick="openTrailerModal('${g.trailer}')">Trailer ›</button>` : ''}
      </div>
    </div>
  `;
  return card;
}

async function openTrailerModal(trailerId) {
  const modal = document.getElementById('trailerModal');
  const body = document.getElementById('trailerModalBody');

  body.innerHTML = '<div class="trailer-modal-loading">Loading trailer...</div>';
  modal.classList.add('open');
  document.body.style.overflow = 'hidden';

  if (trailerId.startsWith('steam:')) {
    const appid = trailerId.slice('steam:'.length);
    try {
      const res = await fetch(`/api/trailer?appid=${appid}`);
      const data = await res.json();
      if (!modal.classList.contains('open')) return; // user closed it while we were loading

      if (data.mp4) {
        body.innerHTML = `<video controls autoplay playsinline src="${data.mp4}"></video>`;
      } else if (data.hls) {
        body.innerHTML = '<video controls autoplay playsinline></video>';
        attachHls(body.querySelector('video'), data.hls);
      } else {
        body.innerHTML = '<div class="trailer-modal-loading">No trailer found.</div>';
      }
    } catch (e) {
      if (modal.classList.contains('open')) body.innerHTML = '<div class="trailer-modal-loading">Could not load trailer.</div>';
    }
    return;
  }

  body.innerHTML = `<iframe src="https://www.youtube.com/embed/${trailerId}?autoplay=1" allow="autoplay; encrypted-media" allowfullscreen loading="lazy"></iframe>`;
}

function attachHls(video, url) {
  if (video.canPlayType('application/vnd.apple.mpegurl')) {
    video.src = url; // Safari/Chrome with native HLS support already pick quality adaptively
    return;
  }
  if (window.Hls && window.Hls.isSupported()) {
    const hls = new Hls();
    hls.loadSource(url);
    hls.attachMedia(video);
    video._hls = hls;
    hls.on(Hls.Events.MANIFEST_PARSED, () => buildQualityMenu(hls));
  }
}

function buildQualityMenu(hls) {
  const select = document.getElementById('trailerQuality');
  const levels = hls.levels
    .map((lvl, i) => ({ i, height: lvl.height }))
    .sort((a, b) => b.height - a.height);

  select.innerHTML = '<option value="-1">Auto</option>' +
    levels.map(l => `<option value="${l.i}">${l.height}p</option>`).join('');
  select.value = '-1';
  select.classList.add('show');
}

function setTrailerQuality(value) {
  const video = document.querySelector('#trailerModalBody video');
  if (video && video._hls) video._hls.currentLevel = parseInt(value, 10);
}

function closeTrailerModal() {
  const modal = document.getElementById('trailerModal');
  const body = document.getElementById('trailerModalBody');
  modal.classList.remove('open');
  document.body.style.overflow = '';
  const video = body.querySelector('video');
  if (video) {
    video.pause();
    if (video._hls) video._hls.destroy();
  }
  body.innerHTML = '';

  const quality = document.getElementById('trailerQuality');
  quality.classList.remove('show');
  quality.innerHTML = '';
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeTrailerModal();
});

function buildSideNav() {
  const inner = document.getElementById('sideNavInner');
  inner.innerHTML = '';
  const totalDays = new Date(2026, activeMonth + 1, 0).getDate();
  const navH = 330;
  const tickSpacing = navH / (totalDays - 1);
  let currentIdx = -1;
  let dragging = false, startY = 0, startIdx = 0;

  for (let i = 0; i < totalDays; i++) {
    const isWeekStart = i % 7 === 0;
    const tick = document.createElement('div');
    tick.id = 'sn-tick-' + i;
    tick.style.cssText = `position:absolute;right:0;top:${i * tickSpacing}px;width:${isWeekStart ? 18 : 10}px;height:1.5px;border-radius:1px;background:rgba(255,255,255,0.2);transform:translateY(-50%);transition:background 0.1s,height 0.1s,width 0.1s;`;
    inner.appendChild(tick);
  }

  const label = document.createElement('div');
  label.className = 'sn-label';
  label.id = 'sn-label';
  label.style.top = '0px';
  label.textContent = 'W1/D1';
  inner.appendChild(label);

  function setActiveDay(idx) {
    idx = Math.max(0, Math.min(totalDays - 1, idx));
    if (currentIdx >= 0) {
      const old = document.getElementById('sn-tick-' + currentIdx);
      if (old) { const w = currentIdx % 7 === 0; old.style.width = (w ? 18 : 10) + 'px'; old.style.height = '1.5px'; old.style.background = 'rgba(255,255,255,0.2)'; }
    }
    currentIdx = idx;
    const tick = document.getElementById('sn-tick-' + idx);
    if (tick) { tick.style.width = '28px'; tick.style.height = '2.5px'; tick.style.background = '#ffffff'; }
    const week = Math.floor(idx / 7) + 1;
    label.style.top = (idx * tickSpacing) + 'px';
    label.textContent = `W${week}/D${idx + 1}`;
  }

  setActiveDay(0);

  inner.addEventListener('mousedown', e => { dragging = true; startY = e.clientY; startIdx = currentIdx; e.preventDefault(); });
  document.addEventListener('mousemove', e => {
    if (!dragging) return;
    const delta = e.clientY - startY;
    const newIdx = Math.max(0, Math.min(totalDays - 1, startIdx + Math.round(delta / tickSpacing)));
    setActiveDay(newIdx);
    const pct = newIdx / (totalDays - 1);
    window.scrollTo({ top: pct * (document.body.scrollHeight - window.innerHeight), behavior: 'instant' });
  });
  document.addEventListener('mouseup', () => { dragging = false; });

  window.addEventListener('scroll', () => {
    const navCard = document.getElementById('navCard');
    if (window.scrollY > 50) navCard.classList.add('scrolled');
    else navCard.classList.remove('scrolled');
    if (dragging) return;
    const pct = window.scrollY / Math.max(1, document.body.scrollHeight - window.innerHeight);
    setActiveDay(Math.round(pct * (totalDays - 1)));
  }, { passive: true });
}

// Init
document.getElementById('heroPill').textContent = MONTHS[activeMonth] + ' 2026';
buildPlatformBar();
buildMonthNav();
setupMonthSwipe();
loadGames(activeMonth);

// Fixed tooltip — position: fixed escapes all overflow:hidden containers
(function () {
  const tip = document.getElementById('site-tooltip');
  document.addEventListener('mouseenter', e => {
    const el = e.target.closest('[data-tooltip]');
    if (!el) return;
    tip.textContent = el.dataset.tooltip;
    tip.className = 'show' +
      (el.classList.contains('card-action-anticipated') ? ' anticipated' : '') +
      (el.classList.contains('card-action-rerelease')   ? ' rerelease'   : '');
    const r = el.getBoundingClientRect();
    tip.style.left = (r.left + r.width / 2) + 'px';
    tip.style.top  = (r.bottom + 7) + 'px';
  }, true);
  document.addEventListener('mouseleave', e => {
    if (e.target.closest('[data-tooltip]')) tip.className = '';
  }, true);
}());
</script>
